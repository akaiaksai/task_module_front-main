name: Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to server
        run: |
          if [ "${GITHUB_REF##*/}" == "main" ]; then
            ssh -o StrictHostKeyChecking=no deployer@89.35.124.11 "bash /var/www/main/task_module_front/deploy.sh"
          elif [ "${GITHUB_REF##*/}" == "dev" ]; then
            ssh -o StrictHostKeyChecking=no deployer@89.35.124.11 "bash /var/www/task_module_front/deploy.sh"
          fi
